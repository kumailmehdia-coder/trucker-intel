<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trucker Intel — USDOT Pro Database</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F4F0;color:#1a1a1a}
  :root{
    --bg:#F5F4F0;--surface:#FFFFFF;--surface2:#EEECEA;--border:rgba(0,0,0,0.10);
    --border2:rgba(0,0,0,0.18);--text:#1a1a1a;--text2:#555;--text3:#888;
    --amber:#EF9F27;--amber-d:#BA7517;--amber-l:#FAEEDA;--amber-text:#412402;
    --green-bg:#EAF3DE;--green-text:#3B6D11;
    --red-bg:#FCEBEB;--red-border:rgba(200,50,50,0.3);--red-text:#A32D2D;
    --r:8px;--r-lg:12px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1C1B19;--surface:#262522;--surface2:#302E2B;--border:rgba(255,255,255,0.10);
      --border2:rgba(255,255,255,0.18);--text:#EDEBE5;--text2:#A8A39A;--text3:#6B6660;
      --amber:#EF9F27;--amber-d:#FAC775;--amber-l:#412402;--amber-text:#FAEEDA;
      --green-bg:#173404;--green-text:#C0DD97;
      --red-bg:#501313;--red-border:rgba(240,150,150,0.3);--red-text:#F09595;
    }
  }
  input,select,button{font-family:inherit;font-size:13px}
  .inp{width:100%;padding:7px 11px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
  .inp:focus{border-color:var(--amber)}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:7px 16px;font-size:12px;font-weight:500;border:0.5px solid var(--border2);border-radius:var(--r);cursor:pointer;background:var(--surface);color:var(--text);transition:all .12s;user-select:none}
  .btn:hover{background:var(--surface2)}
  .btn-amber{background:var(--amber);border-color:var(--amber-d);color:var(--amber-text)}
  .btn-amber:hover:not(:disabled){background:var(--amber-d);color:var(--amber-l)}
  .btn-red{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
  .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg)}
  .lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:5px;display:block}
  .tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .tag-amber{background:var(--amber-l);color:#633806}
  .tag-green{background:var(--green-bg);color:var(--green-text)}
  .toast{position:fixed;bottom:20px;right:20px;z-index:9999;padding:9px 16px;border-radius:var(--r);font-size:12px;border:0.5px solid;animation:ti .2s ease;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
  @keyframes ti{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .toast-ok{background:var(--green-bg);border-color:rgba(0,0,0,0.1);color:var(--green-text)}
  .toast-err{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
  .pb{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin:6px 0}
  .pbf{height:100%;background:var(--amber);transition:width .3s}
  .tbl{width:100%;border-collapse:collapse}
  .tbl th{padding:10px 12px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;color:var(--text3);border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--surface)}
  .tbl td{padding:10px 12px;border-bottom:0.5px solid var(--border);color:var(--text);font-size:12px}
  .tbl tr:hover td{background:var(--surface2)}
  .tab{padding:8px 14px;font-size:12px;font-weight:500;border:none;background:transparent;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent}
  .tab.active{color:var(--amber-d);border-bottom-color:var(--amber)}
  .phone-highlight{color:var(--amber-d);font-weight:600;font-family:'Courier New',monospace}
  .sidebar{width:270px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const API_KEY = "2391d610f4ab3253f9d3b724cbb29bb7ae1deb85";

// Logic to clean and format phone numbers properly
function cleanPhone(raw){
  if(!raw) return "";
  const d = String(raw).replace(/\D/g,"");
  if(!d || d.length < 10) return "";
  if(d === "0000000000" || d === "1234567890") return "";
  
  const main = d.length === 11 && d[0] === "1" ? d.slice(1) : d;
  return `(${main.slice(0,3)}) ${main.slice(3,6)}-${main.slice(6,10)}`;
}

// THE DEEP HUNT: This scans the ENTIRE JSON object for hidden numbers
function deepHuntPhone(obj){
  // 1. Check standard fields
  let found = obj.phoneNumber || obj.telephone || obj.phone || obj.cellPhone || "";
  if(cleanPhone(found)) return cleanPhone(found);

  // 2. Check Nested Contact Object
  if(obj.carrierContact){
    found = obj.carrierContact.phoneNumber || obj.carrierContact.telephone || "";
    if(cleanPhone(found)) return cleanPhone(found);
  }

  // 3. REGEX SCRAPE (The "Pro" Fix)
  // Convert everything to a string and look for phone patterns anywhere in the response
  const blob = JSON.stringify(obj);
  const phoneRegex = /\(?([0-9]{3})\)?[-. ]?([0-9]{3})[-. ]?([0-9]{4})/g;
  const matches = blob.match(phoneRegex);
  
  if(matches && matches.length > 0){
    // Return the first match that isn't a dummy number
    for(let m of matches){
       if(cleanPhone(m)) return cleanPhone(m);
    }
  }
  return null;
}

function App(){
  const [user,setUser]=useState(null);
  const [truckers,setTruckers]=useState([]);
  const [filter,setFilter]=useState({q:""});
  const [dotVal,setDotVal]=useState("");
  const [scan,setScan]=useState({on:false,s:"",e:"",cur:0,tot:0,found:0});
  const [toast,setToast]=useState(null);
  const [tab,setTab]=useState("lookup");
  const [loading,setLoading]=useState(false);
  const scanRef=useRef(false);
  const trRef=useRef([]);

  const msg=(text,type="ok")=>{
    setToast({text,type});
    setTimeout(()=>setToast(null),4000);
  };

  useEffect(()=>{
    const sess=JSON.parse(localStorage.getItem("_sess"));
    if(sess){
      setUser(sess.u);
      const trs=JSON.parse(localStorage.getItem(`t:${sess.u}`))||[];
      trRef.current=trs; setTruckers(trs);
    }
  },[]);

  const fetchDOT=async(dotNum)=>{
    try{
      const res=await fetch(`https://mobile.fmcsa.dot.gov/qc/services/carriers/${dotNum}?webKey=${API_KEY}`);
      if(!res.ok) return null;
      const data=await res.json();
      const c=data?.content?.carrier;
      if(!c||!c.dotNumber) return null;

      // STRICT STATUS CHECK: Only Active Carriers
      const isActive = (c.statusCode === "A" || c.statusCode === "ACTIVE") && c.allowedToOperate !== "N";
      if(!isActive) return { error: "inactive", name: c.legalName };

      // DEEP HUNT FOR PHONE
      const phone = deepHuntPhone(c);

      return{
        dot:String(c.dotNumber),
        name:(c.legalName||c.dbaName||"Unknown").trim(),
        phone: phone || "No Phone Found",
        city:(c.phyCity||"").trim(),
        state:(c.phyState||"").trim().toUpperCase(),
        trucks:parseInt(c.totalTrucks)||0,
        ts:Date.now()
      };
    }catch(e){ return null; }
  };

  const addCarrier=(c)=>{
    const next=[c,...trRef.current.filter(t=>t.dot!==c.dot)];
    trRef.current=next; setTruckers(next);
    localStorage.setItem(`t:${user}`,JSON.stringify(next));
  };

  const lookupOne=async()=>{
    if(!dotVal) return;
    setLoading(true);
    const c=await fetchDOT(dotVal);
    setLoading(false);
    if(!c) return msg("DOT not found","err");
    if(c.error) return msg(`${c.name} is INACTIVE. Skipped.`,"err");
    addCarrier(c); msg(`Added ${c.name}`); setDotVal("");
  };

  const startScan=async()=>{
    const s=parseInt(scan.s), e=parseInt(scan.e);
    if(isNaN(s)||isNaN(e)) return msg("Invalid Range","err");
    scanRef.current=true;
    setScan(v=>({...v,on:true,cur:s,tot:e-s+1,found:0}));
    let fCount=0;
    for(let d=s;d<=e;d++){
      if(!scanRef.current) break;
      setScan(v=>({...v,cur:d}));
      const c=await fetchDOT(d);
      if(c && !c.error){ fCount++; addCarrier(c); setScan(v=>({...v,found:fCount})); }
      await new Promise(r=>setTimeout(r,350));
    }
    setScan(v=>({...v,on:false}));
    msg(`Scan Complete: ${fCount} active found`);
  };

  const filtered=truckers.filter(t=>
    t.name.toLowerCase().includes(filter.q.toLowerCase()) || t.dot.includes(filter.q)
  );

  if(!user) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>
       <button className="btn btn-amber" onClick={()=>{
         localStorage.setItem("_sess",JSON.stringify({u:"Mustajab"}));
         window.location.reload();
       }}>Enter Database</button>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <div style={{background:"var(--surface)",padding:"10px 20px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <b style={{color:"var(--amber-d)",letterSpacing:"1px"}}>◈ TRUCKER INTEL PRO</b>
        <span style={{fontSize:11,color:"var(--text3)"}}>Operator: {user}</span>
      </div>

      <div style={{display:"flex",flex:1,padding:15,gap:15,overflow:"hidden"}}>
        <div className="sidebar">
          <div className="card" style={{padding:15}}>
            <div style={{display:"flex",marginBottom:12,borderBottom:"1px solid var(--border)"}}>
              <button className={`tab ${tab==="lookup"?"active":""}`} onClick={()=>setTab("lookup")}>Single</button>
              <button className={`tab ${tab==="scan"?"active":""}`} onClick={()=>setTab("scan")}>Auto Scan</button>
            </div>
            {tab==="lookup"?(
              <div style={{display:"flex",gap:5}}>
                <input className="inp" placeholder="DOT #" value={dotVal} onChange={e=>setDotVal(e.target.value)}/>
                <button className="btn btn-amber" onClick={lookupOne} disabled={loading}>{loading?"...":"Go"}</button>
              </div>
            ):(
              <div>
                <div style={{display:"flex",gap:5,marginBottom:10}}>
                  <input className="inp" placeholder="Start" value={scan.s} onChange={e=>setScan(v=>({...v,s:e.target.value}))}/>
                  <input className="inp" placeholder="End" value={scan.e} onChange={e=>setScan(v=>({...v,e:e.target.value}))}/>
                </div>
                {scan.on?(
                  <div>
                    <div className="pb"><div className="pbf" style={{width:`${Math.round(((scan.cur-scan.s)/scan.tot)*100)}%`}}/></div>
                    <button className="btn btn-red" style={{width:"100%",marginTop:5}} onClick={()=>scanRef.current=false}>Stop</button>
                  </div>
                ):<button className="btn btn-amber" style={{width:"100%"}} onClick={startScan}>Start Pro Scan</button>}
              </div>
            )}
          </div>
          <div className="card" style={{padding:15}}>
             <label className="lbl">Filter Records</label>
             <input className="inp" placeholder="Search saved..." value={filter.q} onChange={e=>setFilter({q:e.target.value})}/>
          </div>
        </div>

        <div className="card" style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{flex:1,overflow:"auto"}}>
            <table className="tbl">
              <thead>
                <tr>
                  <th>USDOT</th>
                  <th>Company Name</th>
                  <th>Direct Phone</th>
                  <th>Location</th>
                  <th>Trucks</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(t=>(
                  <tr key={t.dot}>
                    <td style={{fontFamily:"monospace",color:"var(--amber-d)"}}>#{t.dot}</td>
                    <td><b>{t.name}</b></td>
                    <td className="phone-highlight">{t.phone === "No Phone Found" ? <span style={{color:"#888",fontWeight:400}}>N/A</span> : t.phone}</td>
                    <td>{t.city}, {t.state}</td>
                    <td><span className="tag tag-green">{t.trucks}</span></td>
                    <td><button className="btn btn-red" style={{padding:"2px 8px"}} onClick={()=>{
                      const n = trRef.current.filter(x=>x.dot!==t.dot);
                      trRef.current=n; setTruckers(n);
                      localStorage.setItem(`t:${user}`,JSON.stringify(n));
                    }}>✕</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
      {toast && <div className={`toast toast-${toast.type}`}>{toast.text}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
