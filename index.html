<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trucker Intel — Ultimate Edition</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F4F0;color:#1a1a1a}
  :root{
    --bg:#F5F4F0;--surface:#FFFFFF;--surface2:#EEECEA;--border:rgba(0,0,0,0.10);
    --border2:rgba(0,0,0,0.18);--text:#1a1a1a;--text2:#555;--text3:#888;
    --amber:#EF9F27;--amber-d:#BA7517;--amber-l:#FAEEDA;--amber-text:#412402;
    --green-bg:#EAF3DE;--green-text:#3B6D11;
    --red-bg:#FCEBEB;--red-border:rgba(200,50,50,0.3);--red-text:#A32D2D;
    --r:8px;--r-lg:12px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1C1B19;--surface:#262522;--surface2:#302E2B;--border:rgba(255,255,255,0.10);
      --border2:rgba(255,255,255,0.18);--text:#EDEBE5;--text2:#A8A39A;--text3:#6B6660;
      --amber:#EF9F27;--amber-d:#FAC775;--amber-l:#412402;--amber-text:#FAEEDA;
      --green-bg:#173404;--green-text:#C0DD97;
      --red-bg:#501313;--red-border:rgba(240,150,150,0.3);--red-text:#F09595;
    }
  }
  input,button{font-family:inherit;font-size:13px}
  .inp{width:100%;padding:7px 11px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
  .inp:focus{border-color:var(--amber)}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:7px 16px;font-size:12px;font-weight:500;border:0.5px solid var(--border2);border-radius:var(--r);cursor:pointer;background:var(--surface);color:var(--text);transition:all .12s;user-select:none}
  .btn:hover{background:var(--surface2)}
  .btn-amber{background:var(--amber);border-color:var(--amber-d);color:var(--amber-text)}
  .btn-amber:hover:not(:disabled){background:var(--amber-d);color:var(--amber-l)}
  .btn-red{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
  .card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg)}
  .lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:5px;display:block}
  .tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .tag-amber{background:var(--amber-l);color:#633806}
  .tag-green{background:var(--green-bg);color:var(--green-text)}
  .toast{position:fixed;bottom:20px;right:20px;z-index:9999;padding:9px 16px;border-radius:var(--r);font-size:12px;border:0.5px solid;animation:ti .2s ease;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
  @keyframes ti{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .toast-ok{background:var(--green-bg);border-color:rgba(0,0,0,0.1);color:var(--green-text)}
  .toast-err{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
  .pb{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin:6px 0}
  .pbf{height:100%;background:var(--amber);transition:width .3s}
  .tbl{width:100%;border-collapse:collapse}
  .tbl th{padding:10px 12px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;color:var(--text3);border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--surface)}
  .tbl td{padding:10px 12px;border-bottom:0.5px solid var(--border);color:var(--text);font-size:12px}
  .tbl tr:hover td{background:var(--surface2)}
  .tab{padding:8px 14px;font-size:12px;font-weight:500;border:none;background:transparent;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent}
  .tab.active{color:var(--amber-d);border-bottom-color:var(--amber)}
  .phone-found{color:var(--amber-d);font-weight:600;font-family:monospace}
  .sidebar{width:270px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const API_KEY = "2391d610f4ab3253f9d3b724cbb29bb7ae1deb85";

// Cleaner function
function formatPhone(s){
  if(!s) return "";
  const d = s.replace(/\D/g,"");
  if(d.length < 10 || d.startsWith("000")) return "";
  const m = d.length === 11 && d[0] === "1" ? d.slice(1) : d;
  return `(${m.slice(0,3)}) ${m.slice(3,6)}-${m.slice(6,10)}`;
}

// HYBRID SCRAPER: Hits the API, and if empty, scrapes SAFER directly
async function getProPhone(dot, apiData){
  // 1. Try API fields first
  let raw = apiData.phoneNumber || apiData.telephone || "";
  if(formatPhone(raw)) return formatPhone(raw);

  // 2. Try Regex on API blob
  const blob = JSON.stringify(apiData);
  const matches = blob.match(/\(?([0-9]{3})\)?[-. ]?([0-9]{3})[-. ]?([0-9]{4})/g);
  if(matches) {
    for(let m of matches) if(formatPhone(m)) return formatPhone(m);
  }

  // 3. NUCLEAR OPTION: Scrape SAFER directly via Proxy
  try {
    const saferUrl = `https://safer.fmcsa.dot.gov/query.asp?searchtype=ANY&query_type=queryCarrierSnapshot&query_param=USDOT&query_string=${dot}`;
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(saferUrl)}`;
    
    const res = await fetch(proxyUrl);
    const json = await res.json();
    const html = json.contents;

    // Look for "Phone: </b>" in the HTML source
    const match = html.match(/Phone:.*?<\/b>.*?([0-9\(\)\-\s]{10,20})/i);
    if(match && match[1]) return formatPhone(match[1]);
  } catch(e) { console.error("Scraper failed", e); }

  return "Missing";
}

function App(){
  const [user,setUser]=useState("Mustajab");
  const [truckers,setTruckers]=useState([]);
  const [filter,setFilter]=useState({q:""});
  const [dotVal,setDotVal]=useState("");
  const [scan,setScan]=useState({on:false,s:"",e:"",cur:0,tot:0});
  const [toast,setToast]=useState(null);
  const [tab,setTab]=useState("lookup");
  const [loading,setLoading]=useState(false);
  const scanRef=useRef(false);

  const msg=(text,type="ok")=>{
    setToast({text,type});
    setTimeout(()=>setToast(null),4000);
  };

  useEffect(()=>{
    const saved = JSON.parse(localStorage.getItem(`t:${user}`)) || [];
    setTruckers(saved);
  },[]);

  const fetchFullData = async(dotNum) => {
    try {
      const res = await fetch(`https://mobile.fmcsa.dot.gov/qc/services/carriers/${dotNum}?webKey=${API_KEY}`);
      const data = await res.json();
      const c = data?.content?.carrier;
      if(!c || !c.dotNumber) return null;

      // Extract phone using the Hybrid Scraper
      const phone = await getProPhone(dotNum, c);

      return {
        dot: String(c.dotNumber),
        name: (c.legalName || "Unknown").trim(),
        phone: phone,
        location: `${c.phyCity || ""}, ${c.phyState || ""}`,
        trucks: c.totalTrucks || 0,
        status: c.statusCode || "I"
      };
    } catch(e) { return null; }
  };

  const saveCarrier = (c) => {
    setTruckers(prev => {
      const next = [c, ...prev.filter(x => x.dot !== c.dot)];
      localStorage.setItem(`t:${user}`, JSON.stringify(next));
      return next;
    });
  };

  const runLookup = async() => {
    if(!dotVal) return;
    setLoading(true);
    const res = await fetchFullData(dotVal);
    setLoading(false);
    if(res) {
        saveCarrier(res);
        msg(res.phone === "Missing" ? "Found Carrier (No Phone)" : `Found: ${res.phone}`);
        setDotVal("");
    } else msg("Not found", "err");
  };

  const startAutoScan = async() => {
    const s=parseInt(scan.s), e=parseInt(scan.e);
    if(isNaN(s) || isNaN(e)) return msg("Invalid Range", "err");
    scanRef.current = true;
    setScan(v => ({...v, on:true, tot: e-s+1}));
    
    for(let i=s; i<=e; i++){
      if(!scanRef.current) break;
      setScan(v => ({...v, cur: i}));
      const res = await fetchFullData(i);
      if(res && res.status === 'A') saveCarrier(res);
      await new Promise(r => setTimeout(r, 400));
    }
    setScan(v => ({...v, on:false}));
    msg("Scan Complete");
  };

  const filtered = truckers.filter(t => 
    t.name.toLowerCase().includes(filter.q.toLowerCase()) || t.dot.includes(filter.q)
  );

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <div style={{background:"var(--surface)",padding:"12px 20px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between"}}>
        <b style={{color:"var(--amber-d)"}}>◈ TRUCKER INTEL — HYBRID SCRAPER v3</b>
      </div>

      <div style={{display:"flex",flex:1,padding:15,gap:15,overflow:"hidden"}}>
        <div className="sidebar">
          <div className="card" style={{padding:15}}>
            <div style={{display:"flex",marginBottom:10}}>
              <button className={`tab ${tab==="lookup"?"active":""}`} onClick={()=>setTab("lookup")}>Manual</button>
              <button className={`tab ${tab==="scan"?"active":""}`} onClick={()=>setTab("scan")}>Auto</button>
            </div>
            {tab==="lookup" ? (
              <div style={{display:"flex",gap:5}}>
                <input className="inp" placeholder="DOT #" value={dotVal} onChange={e=>setDotVal(e.target.value)}/>
                <button className="btn btn-amber" onClick={runLookup} disabled={loading}>{loading?"...":"Go"}</button>
              </div>
            ) : (
              <div>
                <div style={{display:"flex",gap:5,marginBottom:10}}>
                  <input className="inp" placeholder="Start" onChange={e=>setScan(v=>({...v,s:e.target.value}))}/>
                  <input className="inp" placeholder="End" onChange={e=>setScan(v=>({...v,e:e.target.value}))}/>
                </div>
                <button className="btn btn-amber" style={{width:"100%"}} onClick={startAutoScan} disabled={scan.on}>
                   {scan.on ? `Scanning ${scan.cur}...` : "Start Hybrid Scan"}
                </button>
                {scan.on && <div className="pb"><div className="pbf" style={{width:`${((scan.cur-scan.s)/scan.tot)*100}%`}}/></div>}
              </div>
            )}
          </div>
          <input className="inp" placeholder="Filter List..." value={filter.q} onChange={e=>setFilter({q:e.target.value})}/>
        </div>

        <div className="card" style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <table className="tbl">
            <thead>
              <tr><th>DOT</th><th>Company</th><th>Verified Phone</th><th>Location</th><th>Trucks</th><th></th></tr>
            </thead>
            <tbody>
              {filtered.map(t => (
                <tr key={t.dot}>
                  <td style={{fontFamily:"monospace"}}>#{t.dot}</td>
                  <td><b>{t.name}</b></td>
                  <td className="phone-found">{t.phone === "Missing" ? <span style={{color:"#999",fontWeight:400}}>NOT ON SAFER</span> : t.phone}</td>
                  <td>{t.location}</td>
                  <td><span className="tag tag-green">{t.trucks}</span></td>
                  <td><button className="btn btn-red" style={{padding:"2px 8px"}} onClick={()=>{
                     const n = truckers.filter(x=>x.dot!==t.dot);
                     setTruckers(n); localStorage.setItem(`t:${user}`, JSON.stringify(n));
                  }}>✕</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {toast && <div className={`toast toast-${toast.type}`}>{toast.text}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
